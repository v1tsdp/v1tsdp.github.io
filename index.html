      width: 50px;
      height: 50px;
      transition: transform 0.2s ease, color 0.2s ease;
      color: #ffffff;
      text-decoration: none;
    }

    .social-links a:hover {
      transform: scale(1.2);
      color: #dddddd;
    }

    .social-links svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    @media (max-width: 480px) {
